<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYC</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <style>
        html,
        body {
            min-height: 100%;
            margin: 0;
            background: #02040a;
            color: #f8fafc;
            font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
        }

        body {
            display: grid;
            place-items: center;
        }

        .fallback {
            display: grid;
            gap: 12px;
            text-align: center;
        }

        .fallback a {
            color: #fff;
        }
    </style>
    <script>
        (function () {
            var version = localStorage.getItem('hycSearchPageVersion') || 'v2';
            var target = version === 'v1' ? 'search-v1.html' : 'search-v2.html';
            window.location.replace(target);
        }());
    </script>
</head>

<body>
    <div class="fallback">
        <span>正在打开搜索页面...</span>
        <a href="search-v2.html" onclick="localStorage.setItem('hycSearchPageVersion', 'v2')">打开新版</a>
        <a href="search-v1.html" onclick="localStorage.setItem('hycSearchPageVersion', 'v1')">打开旧版</a>
    </div>
</body>

</html>
